server:
  port: 8080

spring:
  application:
    name: loan-management-system
  
  # Database Configuration
  datasource:
    url: jdbc:h2:mem:loandb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  # JPA Configuration
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  
  # H2 Console (Development)
  h2:
    console:
      enabled: true
      path: /h2-console
  
  # Mail Configuration (Gmail SMTP)
  # Set these environment variables or replace with your credentials:
  #   MAIL_USERNAME=your-email@gmail.com
  #   MAIL_PASSWORD=your-app-password
  mail:
    host: smtp.gmail.com
    port: 587
    username: boppanapavan63@gmail.com
    password: qphm tkqf ojkx yhlc
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enabled: true
            required: true

  # Allow bean override for conditional mail sender
  main:
    allow-bean-definition-overriding: true

# JWT Configuration
jwt:
  secret: mySecretKeyForJWTTokenGenerationThatIsLongEnoughToBeSecure2024LoanManagementSystem
  expiration: 86400000 # 24 hours in milliseconds
  refresh-expiration: 604800000 # 7 days in milliseconds

# Google OAuth Configuration
# Replace with your Google Cloud OAuth Client ID
google:
  oauth:
    client-id: ${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID_HERE}

# OpenAPI / Swagger Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

# Logging Configuration
logging:
  level:
    com.loanmanagement: DEBUG
    org.springframework.security: DEBUG
